<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Погодные данные с метеостанций</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link href="{{ url_for('static', filename='css/main.css') }}" rel="stylesheet" crossorigin="anonymous">
  </head>
  <body>

    <nav class="navbar navbar-light bg-light">
        <div class="container-fluid">
          <a class="navbar-brand" href="#">
            <img class="nav-img" src="{{ url_for('static', filename='images/station.jpg') }}" alt="" width="30" height="30" class="d-inline-block align-text-top">
            Погодные данные с метеостанций
          </a>
        </div>
      </nav>

      <br/>
      <h3 style="margin-top: 15px; margin-left: 5px;">Выберите метеостанцию:</h3>
      <select class="form-select">
        <option selected>список станций</option>
        {% for station in stations %}
            <option value="{{ station.id }}">{{ station.title }}</option>
        </a><br />
        {% endfor %}
      </select>
      <button type="button" class="btn btn-dark" style="margin-top: 15px; margin-left: 5px;">Показать</button>
  </body>
</html>
